<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊商 - 原型预览入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 8px;
        }

        .logo p {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 14px;
            color: #999;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .prototype-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .prototype-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.2s;
        }

        .prototype-item:hover {
            background: #f0f4ff;
            transform: translateX(8px);
        }

        .prototype-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .prototype-info {
            flex: 1;
        }

        .prototype-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .prototype-desc {
            font-size: 13px;
            color: #666;
        }

        .prototype-arrow {
            color: #ccc;
            font-size: 20px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 11px;
            background: #667eea;
            color: #fff;
            border-radius: 10px;
            margin-left: 8px;
        }

        .badge-orange {
            background: #ff9500;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>💬 聊商</h1>
            <p>AI智能聊天助手 - 原型预览</p>
        </div>

        <div class="card">
            <div class="card-title">核心功能原型</div>
            <div class="prototype-list">
                <a href="../prototype/prototype.html" class="prototype-item" target="_blank">
                    <div class="prototype-icon">🏠</div>
                    <div class="prototype-info">
                        <div class="prototype-name">主界面原型 <span class="badge">完整</span></div>
                        <div class="prototype-desc">首页、人设管理、场景、设置、引导页</div>
                    </div>
                    <div class="prototype-arrow">→</div>
                </a>

                <a href="../prototype/keyboard-prototype.html" class="prototype-item" target="_blank">
                    <div class="prototype-icon">⌨️</div>
                    <div class="prototype-info">
                        <div class="prototype-name">键盘视图原型 <span class="badge">独立</span></div>
                        <div class="prototype-desc">AI回复生成、快捷回复、人设切换</div>
                    </div>
                    <div class="prototype-arrow">→</div>
                </a>

                <a href="../prototype/persona-edit-prototype.html" class="prototype-item" target="_blank">
                    <div class="prototype-icon">👤</div>
                    <div class="prototype-info">
                        <div class="prototype-name">人设编辑原型 <span class="badge badge-orange">简化</span></div>
                        <div class="prototype-desc">创建人设、选择标签、关系场景</div>
                    </div>
                    <div class="prototype-arrow">→</div>
                </a>
            </div>
        </div>

        <div class="card">
            <div class="card-title">其他原型</div>
            <div class="prototype-list">
                <a href="../prototype/onboarding-prototype.html" class="prototype-item" target="_blank">
                    <div class="prototype-icon">📖</div>
                    <div class="prototype-info">
                        <div class="prototype-name">引导页原型</div>
                        <div class="prototype-desc">新用户首次使用引导</div>
                    </div>
                    <div class="prototype-arrow">→</div>
                </a>

                <a href="../prototype/settings-prototype.html" class="prototype-item" target="_blank">
                    <div class="prototype-icon">⚙️</div>
                    <div class="prototype-info">
                        <div class="prototype-name">设置页原型</div>
                        <div class="prototype-desc">应用设置、账号管理等</div>
                    </div>
                    <div class="prototype-arrow">→</div>
                </a>
            </div>
        </div>

        <div class="footer">
            点击任意原型卡片即可在 新标签页 中打开预览
        </div>
    </div>
</body>
</html>
